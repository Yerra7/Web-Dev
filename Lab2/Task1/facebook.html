<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook – Log In</title>
    <link rel="stylesheet" href="facebook.css">
</head>
<body>

<main class="container">
    <section class="left">
        <h1 class="logo">facebook</h1>
        <p>Facebook помогает вам общаться и делиться своими мыслями с людьми в вашей жизни.</p>
    </section>

    <section class="right">
        <form class="login-box">
            <input type="text" placeholder="Электронная почта или номер телефона" required>
            <input type="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>

            <a href="#" class="forgot">Забыли пароль?</a>
            <hr>
            <a href="#" class="create">Создать новый аккаунт</a>
        </form>
    </section>
</main>

</body>
</html>
